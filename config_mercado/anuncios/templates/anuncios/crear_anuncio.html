<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Anuncio Gratis - Mercado Regional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌽 MERCADO REGIONAL</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm p-4 mb-5">
                    <h2 class="text-center text-success fw-bold mb-4">📢 Publica tu Anuncio Gratis</h2>
                    <p class="text-muted text-center">Llena los datos de tu producto, casa o servicio. Recuerda colocar tu número de contacto en la descripción.</p>
                    <hr>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %} {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">🚀 Publicar Ahora</button>
                            <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
